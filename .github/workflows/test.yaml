name: Test
on:
  push:
    branches:
      - "**"
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint
        uses: golangci/golangci-lint-action@v7
      - name: Test
        run: |
          cd ui/
          npm install
          cd ../
          make test
